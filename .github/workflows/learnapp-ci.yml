name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'projects/learnapp/package-lock.json'

      - name: Install dependencies
        working-directory: projects/learnapp
        run: npm ci

      - name: Lint
        working-directory: projects/learnapp
        run: npm run lint

      - name: Type check
        working-directory: projects/learnapp
        run: npm run type-check

      - name: Lint vocabulary
        working-directory: projects/learnapp
        run: npm run lint:vocab

      - name: Build
        working-directory: projects/learnapp
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
