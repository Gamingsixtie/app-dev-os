# Phase 7 D-12/D-13: monthly schema-drift detection for Anthropic's skills docs.
#
# D-12: Detect drift only. Open a GitHub issue; NEVER auto-update lesson content.
#       Human review interprets whether the drift is cosmetic, additive, or breaking.
# D-13: Author-facing (opens issues); not learner-facing. Lesson-level stale-content
#       UI is Phase 10 INFRA-06 scope.
#
# Trigger:
#   - Monthly cron: 1st of month, 07:00 UTC (07-RESEARCH §Schema-Drift Cron Workflow §Cron schedule).
#   - Manual workflow_dispatch: allows dry-runs during verification or out-of-cycle checks.
#
# Permissions: least-privilege (contents:read + issues:write ONLY). No push, no
# secrets surface, no outside API calls beyond the public docs URL.
#
# Checkout pins ref: main explicitly (07-RESEARCH §Pitfall 6 — cron workflows default
# to the repository default branch; if that ever changes, an unpinned cron reads
# the wrong tree and diffs a stale baseline against live docs).
#
# Baseline: .planning/anthropic-skills-snapshot.md (committed, PR-reviewed on update).
# The first dispatch of this workflow against the initial placeholder baseline will
# detect drift — that is the intended trigger for the author to run --update locally
# and commit the real normalized baseline in a follow-up PR (see the baseline file's
# own header comments for the full flow).
name: Schema Drift Check

on:
  schedule:
    - cron: '0 7 1 * *'    # 1st of month, 07:00 UTC
  workflow_dispatch: {}    # enables manual dry-runs

permissions:
  contents: read
  issues: write

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'projects/learnapp/package-lock.json'

      - name: Install dependencies
        working-directory: projects/learnapp
        run: npm ci

      - name: Fetch and diff schema
        id: drift
        working-directory: projects/learnapp
        continue-on-error: true
        run: |
          npx tsx scripts/snapshot-anthropic-schema.ts --check \
            --page https://code.claude.com/docs/en/skills \
            --snapshot .planning/anthropic-skills-snapshot.md \
            --output drift-report.txt

      - name: Set drift flag
        id: flag
        working-directory: projects/learnapp
        run: |
          if [ -f drift-report.txt ]; then
            echo "drifted=true" >> "$GITHUB_OUTPUT"
          else
            echo "drifted=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open issue on drift
        if: steps.flag.outputs.drifted == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: projects/learnapp
        run: |
          gh issue create \
            --title "Schema drift detected ($(date -u +%Y-%m-%d))" \
            --body-file drift-report.txt \
            --label "schema-drift"

      - name: Fail workflow if drift
        if: steps.flag.outputs.drifted == 'true'
        run: exit 1
