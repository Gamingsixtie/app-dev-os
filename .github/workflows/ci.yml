name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  validate:
    name: Validate template (scripts, hooks, skills)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Syntax check shell scripts
        run: |
          for f in scripts/*.sh; do
            [ -f "$f" ] && bash -n "$f"
          done

      - name: Syntax check hook scripts
        run: |
          for f in .claude/hooks/*.js; do
            [ -f "$f" ] && node --check "$f"
          done

      - name: Validate SKILL.md frontmatter
        run: |
          EXIT_CODE=0
          for skill_dir in .claude/skills/*/; do
            [ ! -d "$skill_dir" ] && continue
            SKILL_FILE="$skill_dir/SKILL.md"
            [ ! -f "$SKILL_FILE" ] && continue

            FOLDER_NAME=$(basename "$skill_dir")
            [ "$FOLDER_NAME" = "_catalog" ] && continue

            # Extract YAML frontmatter (between first two --- markers, body --- ignored)
            FRONTMATTER=$(awk 'NR==1 && /^---$/{flag=1; next} flag && /^---$/{exit} flag' "$SKILL_FILE")

            # Extract name field
            YAML_NAME=$(echo "$FRONTMATTER" | sed -n '/^name:/s/^name: *//p' | tr -d '"' | head -1)

            if [ "$YAML_NAME" != "$FOLDER_NAME" ]; then
              echo "ERROR: $SKILL_FILE — name '$YAML_NAME' does not match folder '$FOLDER_NAME'"
              EXIT_CODE=1
            fi

            # Frontmatter length check (max 1024 chars per Claude Code spec)
            FM_LENGTH=${#FRONTMATTER}
            if [ "$FM_LENGTH" -gt 1024 ]; then
              echo "ERROR: $SKILL_FILE — frontmatter is ${FM_LENGTH} chars (max 1024)"
              EXIT_CODE=1
            fi
          done
          exit $EXIT_CODE

  detect-changes:
    name: Detect which apps changed
    runs-on: ubuntu-latest
    outputs:
      concurrentoolVO: ${{ steps.filter.outputs.concurrentoolVO }}
    steps:
      - uses: actions/checkout@v5
      - name: Filter changed paths per app
        id: filter
        uses: dorny/paths-filter@v3
        with:
          # Add a new entry per app under apps/. The job below mirrors
          # this matrix — when a new app is added, add it here AND add
          # a parallel job below.
          filters: |
            concurrentoolVO:
              - 'apps/concurrentoolVO/**'

  concurrentoolVO:
    name: Build + test — concurrentoolVO
    needs: detect-changes
    if: needs.detect-changes.outputs.concurrentoolVO == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/concurrentoolVO
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/concurrentoolVO/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (typechecks + bundles)
        # `npm run build` runs `tsc -b && vite build` — type errors fail here
        run: npm run build

      - name: Unit tests (vitest)
        run: npx vitest run

  ci-success:
    name: CI
    # This is the single required check for branch protection.
    # It depends on every conditional app job + the validate job.
    # If any required job fails or is cancelled, this job fails.
    # If a job is skipped (e.g. app not changed in this PR), that's OK.
    if: always()
    runs-on: ubuntu-latest
    needs: [validate, detect-changes, concurrentoolVO]
    steps:
      - name: Check that no required job failed or was cancelled
        run: |
          # GitHub workflow `needs` results: success | failure | cancelled | skipped
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "❌ One or more jobs failed."
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "❌ One or more jobs were cancelled."
            exit 1
          fi
          echo "✅ All required jobs passed (or were appropriately skipped)."
